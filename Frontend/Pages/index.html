<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Store - Home</title>
    <link rel="stylesheet" href="../CSS/style.css" />
    <!-- DataTables (simple client table) -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" />
    <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="../Scripts/ajaxCalls.js"></script>
    <script src="../Scripts/auth.js"></script>
    <script src="../Scripts/api_routes.js"></script>
    <script src="../Scripts/main.js"></script>
    <script src="../Scripts/renderCards.js"></script>

</head>
<body>
    <header>
        <div class="title-area">
            <h1>Steam</h1>
        </div>
        <nav class="main-nav">
            <a href="index.html" class="active">Store</a>
            <a href="MyGames.html">My Games</a>
        </nav>
        <div class="auth-nav">
            <a href="Login.html" id="login">Login</a>
            <a href="#" id="logout">Logout</a>
        </div>
    </header>

    <div class="container">
        <div class="controls">
            <div id="filters-bar" class="filters-bar">
                <input type="text" id="search-input" placeholder="Search games...">
                <button id="search-btn" class="btn-secondary">Search</button>
                <input type="text" id="tags-input" list="tags-list" placeholder="Type or select tags...">
                <datalist id="tags-list"></datalist>

                <select id="price-filter">
                    <option value="all">Any Price</option>
                    <option value="free">Free</option>
                    <option value="paid">Paid</option>
                </select>
                <div class="os-filters">
                    <label><input class="checkbox" type="checkbox" id="os-windows"> Windows</label>
                    <label><input class="checkbox" type="checkbox" id="os-mac"> Mac</label>
                    <label><input class="checkbox" type="checkbox" id="os-linux"> Linux</label>
                </div>
            </div>
        </div>
        <div id="selected-tags-container"></div>



        <h2 class="section-title">All Games</h2>
        <div class="toolbar">
            <div>
                <button id="show-recommendations-btn" class="btn-secondary">Get Recommendations</button>
            </div>
            <div>
                <button id="toggle-view-btn" class="create-btn">Show Table View</button>
            </div>
        </div>

        <div id="games-container" class="games-grid">
            <p id="loading-message" class="loading-message">Loading games...</p>
        </div>

        <!-- Table view: hidden by default. Will be initialized via JS as a DataTable. -->
        <div id="games-table-wrapper" class="hidden">
            <table id="games-table" class="display" style="width:100%">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Release Date</th>
                        <th>Review</th>
                        <th>Price</th>
                        <th>Platforms</th>
                        <th>Tags</th>
                        <th>Link</th>
                        <th>Add</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

</body>
</html>
